name: Deploy to GitHub Pages

on:
  push:
    branches: [main, reminders/phone-push]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_BASE_PATH: /medical-records-keeper/
          VITE_SUPABASE_URL: https://mpanuzarzcfgjbheepmj.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1wYW51emFyemNmZ2piaGVlcG1qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2Nzg3NzYsImV4cCI6MjA5MzI1NDc3Nn0.gzMcWQ9evH17EqaTYPDkAAU71nIzB0Xr9oJ3rbQfEFQ
          VITE_VAPID_PUBLIC_KEY: BCc_bFqs1a5CZ6ep5bFyjk1zoIodRggwwxpD6GXBPmLEm32IDLYOtUYwdZtzfBnPlNsVQtRt8UqpO_tX-i5532I
        run: npm run build

      - name: Copy index.html to 404.html for SPA routing
        run: cp dist/public/index.html dist/public/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
